<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullSignature</title>
  </head>
  <body style="margin:0; padding:0; background-color:#FFFFFF;">

    <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0" style="width:100%; margin:0; padding:0; background-color:#FFFFFF;" bgcolor="#FFFFFF">
        
      <tr>
        <td align="left" style="padding:0 0;">
          
            <table role="presentation" width="600" border="0" cellpadding="0" cellspacing="0" style="width:100%; max-width:650px; background-color:#FFFFFF;" bgcolor="#FFFFFF">
            
            <tr>
              <td style="padding:0 0 0 0;">
                <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0">
                  <tr>
                    <td valign="bottom" align="left">
                      <a href="https://www.mpengs.com" target="_blank" style="text-decoration:none;">
                        <img src="https://raw.githubusercontent.com/Pezcue/Email-Signature/d9d8055a89c0616aa190756c162d73f305f88b46/logo.svg" alt="MP Engineers logo" width="208" border="0" style="display:block; width:267px; max-width:100%; height:auto; border:0; outline:none; text-decoration:none;">
                      </a>
                    </td>
                    <td valign="middle" align="right">
                      <a href="https://www.mpengs.com" target="_blank" style="text-decoration:none;">
                        <img src="https://raw.githubusercontent.com/Pezcue/Email-Signature/d9d8055a89c0616aa190756c162d73f305f88b46/20yr.svg" alt="MP Engineers 20 years mark" width="186" border="0" style="display:block; width:186px; max-width:100%; height:auto; border:0; outline:none; text-decoration:none;">
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

                <!-- blue text block -->
            <tr>
              <td>
                <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0">
                  <tr>
                    <td width="105" height="120" style="width:77px; height:120px; font-size:0; line-height:0; background-color:#FFFFFF;" bgcolor="#FFFFFF">&nbsp;</td>
                    <td valign="top" style="background-color:#045084;" bgcolor="#045084">
                      <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0" style="width:100%; table-layout:fixed; background-color:#045084;" bgcolor="#045084">
                        <tr>
                          <td width="30" height="20" style="width:30px; min-width:30px; max-width:30px; height:20px; font-size:0; line-height:0;">&nbsp;</td>
                          <td height="20" style="height:20px; font-size:0; line-height:0;">&nbsp;</td>
                        </tr>
                        <tr>
                          <td width="30" style="width:30px; min-width:30px; max-width:30px; font-size:0; line-height:0;">&nbsp;</td>
                          <td style="padding:21px 30px 21px 0px; border-left:1px solid #FFFFFF;">
                            <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0">
                              <tr>
                                <td width="20" style="width:20px; font-size:0; line-height:0;">&nbsp;</td>
                                <td width="235" valign="top" style="width:235px; padding:0 26px 0 0; font-family:Arial, Helvetica, sans-serif; color:#FFFFFF;">
                                  <table role="presentation" border="0" cellpadding="0" cellspacing="0">

                                    <!-- Full Name -->
                                    <tr>
                                      <td style="font-family:Arial, Helvetica, sans-serif; font-size:26px; line-height:30px; font-weight:700; letter-spacing:2px; color:#FFFFFF; text-transform:uppercase;">
                                        JOHN DOE</td>
                                    </tr>
                                    <!-- Company Role -->
                                    <tr>
                                      <td style="padding-top:11px; font-family:Arial, Helvetica, sans-serif; font-size:16px; line-height:20px; font-weight:400; letter-spacing:3px; color:#FFFFFF; text-transform:uppercase;">
                                        COMPANY ROLE</td>
                                    </tr>
                                  </table>
                                </td>

                                <!-- Data Block -->
                                <td valign="top" align="right" style="font-family:Arial, Helvetica, sans-serif; color:#FFFFFF;">
                                  <table role="presentation" border="0" cellpadding="0" cellspacing="0" align="right">

                                    <!-- Email -->
                                    <tr>
                                      <td align="right" style="padding:0 0 12px 0; font-family:Arial, Helvetica, sans-serif; font-size:13px; line-height:18px; letter-spacing:1px; color:#FFFFFF;">
                                        <a href="mailto:john.doe@mpengs.com" style="color:#FFFFFF; text-decoration:none;">john.doe@mpengs.com</a>
                                      </td>
                                    </tr>
                                    <!-- Site -->
                                    <tr>
                                      <td align="right" style="padding:0 0 12px 0; font-family:Arial, Helvetica, sans-serif; font-size:13px; line-height:18px; letter-spacing:1px; color:#FFFFFF;">
                                        <a href="https://www.mpengs.com" target="_blank" style="color:#FFFFFF; text-decoration:none;">mpengs.com</a>
                                      </td>
                                    </tr>
                                    <!-- Phone number -->
                                    <tr>
                                      <td align="right" style="font-family:Arial, Helvetica, sans-serif; font-size:13px; line-height:18px; letter-spacing:1px; color:#FFFFFF;">
                                        <a href="tel:8888888888" style="color:#FFFFFF; text-decoration:none;">(888) 888 - 8888</a>
                                      </td>
                                    </tr>
                                  </table>
                                </td>
                              </tr>
                            </table>
                          </td>
                        </tr>

                        <!-- Decoration -->
                        <tr>
                          <td width="30" height="30" style="width:30px; min-width:30px; max-width:30px; height:30px; border-top:1px solid #FFFFFF; font-size:0; line-height:0;">&nbsp;</td>
                          <td height="30" style="height:30px; border-top:1px solid #FFFFFF; border-left:1px solid #FFFFFF;">
                            <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0">
                              <tr>
                                <td width="20" style="width:20px; font-size:0; line-height:0;">&nbsp;</td>
                                <td style="font-size:0; line-height:0;">&nbsp;</td>
                              </tr>
                            </table>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
